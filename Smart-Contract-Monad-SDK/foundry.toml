[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/"
]
fs_permissions = [{ access = "read-write", path = "./" }]
metadata_hash = "none"
use_literal_content = true

[rpc_endpoints]
monad_testnet = "https://rpc.ankr.com/monad_testnet"

[etherscan]
monad_testnet = { key = "placeholder" }
